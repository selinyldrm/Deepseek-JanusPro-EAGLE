# Eagle 3 Training Configuration for Image Generation Models

# Model Configuration
model: "lumina_mgpt"
base_path: "ckpts/lumina_mgpt/Lumina-mGPT-7B-768"
config_path: "traineagle3/config.json"

# Data Configuration
data_dir: "/home/server44/sihwan_workspace/ssd/lumina_mgpt_eagle_mscoco2017train"
save_dir: "ckpts/lumina_mgpt/trained_drafters_eagle3"
train_data_ratio: 0.95
max_len: 4096

# Dataset Options
coupled: false
data_noise: "uniform"
mean: 0.0
std: 0.2

# Training Hyperparameters
lr: 1e-4
bs: 4
gradient_accumulation_steps: 1
num_epochs: 20
warmup_steps_ratio: 0.03
is_warmup: true

# Eagle 3 Specific Parameters
length: 7                    # Multi-step training length
eagle3_weight_decay: 0.8    # Weight decay for multi-step loss

# Loss Configuration
p_w: 0.1
cfg_loss: false
cfg_scale: 3.0
embed_upscale: 1.0
grad_clip: 0.5

# Evaluation and Logging
eval_freq: 1
save_freq: 5
wandb: false

# Performance Options
num_workers: 0
pin_memory: true
mixed_precision: "bf16"

# Architecture Details (from Eagle 3)
# - Uses 3-layer feature extraction from target model
# - Multi-step iterative training (7 steps)
# - Progressive attention masking
# - Weighted loss combination across steps
# - Single decoder layer with embedding fusion

